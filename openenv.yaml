name: incident-response-env
description: >
  A real-world incident response simulation environment where agents
  investigate and resolve infrastructure issues such as server failures,
  security breaches, and database outages.

version: "1.0"

entrypoint: app:app

protocol: http

endpoints:
  reset: /reset
  step: /step
  state: /state

models:
  observation:
    type: object
    properties:
      status:
        type: string
      logs:
        type: array
        items:
          type: string
      step_count:
        type: integer
      incident_type:
        type: string

  action:
    type: object
    properties:
      action:
        type: string
        enum: ["investigate", "resolve"]

  reward:
    type: number

tasks:
  - name: easy_resolution
    description: Successfully resolve the incident

  - name: efficient_resolution
    description: Resolve the incident in minimal steps

  - name: correct_sequence
    description: Follow correct sequence (investigate before resolve)