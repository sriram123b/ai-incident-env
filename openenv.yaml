name: incident-response-env
description: Incident response simulation environment

version: "1.0"

entrypoint: app:app
protocol: http

endpoints:
  reset: /reset
  step: /step
  state: /state

models:
  observation:
    type: object
    properties:
      status:
        type: string
      logs:
        type: array
        items:
          type: string
      step_count:
        type: integer
      incident_type:
        type: string

  action:
    type: object
    properties:
      action:
        type: string
        enum: ["investigate", "resolve"]

  reward:
    type: number

tasks:
  - name: easy_resolution
    description: Resolve the incident
    success_condition:
      status: resolved

  - name: efficient_resolution
    description: Resolve in minimal steps
    success_condition:
      max_steps: 3

  - name: correct_sequence
    description: Investigate before resolving
    success_condition:
      logs_must_include:
        - Investigating
        - Resolved
